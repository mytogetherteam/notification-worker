spring.application.name=mytogether-notification-worker
server.port=${PORT:8081}

# RabbitMQ Configuration
# Railway native plugin injects RABBITMQ_URL
spring.rabbitmq.uri=${RABBITMQ_URL:amqp://localhost:5672}
# Firebase Configuration
firebase.enabled=${FIREBASE_ENABLED:false}
firebase.config-path=${FIREBASE_CONFIG_PATH:firebase-service-account.json}
# Alternatively, if passing raw JSON via ENV
firebase.credentials-json=${FIREBASE_CREDENTIALS_JSON:}

spring.threads.virtual.enabled=true
logging.level.org.th.notification=DEBUG

# BetterStack (Logtail) Configuration
logtail.source-token=${LOGTAIL_SOURCE_TOKEN:}
